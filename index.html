<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coachella W2 Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Oxanium:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #020611;
        --bg-deep: #040a17;
        --panel: rgba(7, 18, 35, 0.34);
        --panel-border: rgba(190, 241, 255, 0.34);
        --line: rgba(164, 233, 255, 0.1);
        --text: #f3fdff;
        --muted: rgba(216, 244, 255, 0.74);
        --blue: #88e9ff;
        --blue-bright: #caf6ff;
        --blue-core: #50d7ff;
        --shadow:
          0 0 24px rgba(116, 226, 255, 0.2),
          0 0 68px rgba(80, 215, 255, 0.14),
          0 0 140px rgba(80, 215, 255, 0.08),
          0 0 110px rgba(255, 79, 216, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Outfit", sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      body.unlocked {
        overflow: auto;
      }

      .page {
        position: relative;
        min-height: 100vh;
        isolation: isolate;
        background: var(--bg);
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(180deg, rgba(2, 8, 18, 0.48) 0%, rgba(2, 8, 18, 0.24) 38%, rgba(1, 5, 14, 0.62) 100%),
          radial-gradient(circle at 50% 52%, rgba(79, 230, 233, 0.1), transparent 24%),
          linear-gradient(90deg, rgba(2, 7, 16, 0.48) 0%, rgba(3, 10, 21, 0.18) 36%, rgba(3, 10, 21, 0.08) 62%, rgba(2, 7, 16, 0.44) 100%),
          url("hero-face.png");
        background-size: cover;
        background-position: 72% center;
        background-repeat: no-repeat;
        transition: filter 900ms ease, transform 900ms ease, opacity 900ms ease;
        will-change: transform, filter;
      }

      .page.is-locked .hero-bg {
        filter: blur(24px);
        transform: scale(1.05);
      }

      .page.is-unlocking .hero-bg {
        filter: blur(0);
        transform: scale(1);
      }

      .page.is-unlocking .hero-bg::after {
        animation: ripple-flash 820ms ease-out forwards;
      }

      .page.is-locked {
        overflow: hidden;
      }

      .page.is-locked .shell {
        opacity: 0;
        pointer-events: none;
        user-select: none;
      }

      .page.is-unlocking .shell {
        opacity: 1;
        transition: opacity 800ms ease 120ms;
      }

      .page.is-unlocking .gate {
        animation: gate-fade 700ms ease forwards;
      }

      .page.is-unlocking .hero-rift {
        animation: rift-bloom 920ms ease-out forwards;
      }

      .hero-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 18%, transparent 82%, rgba(255, 255, 255, 0.025) 100%),
          repeating-linear-gradient(180deg, rgba(160, 240, 241, 0.05) 0, rgba(160, 240, 241, 0.05) 1px, transparent 1px, transparent 4px);
        mix-blend-mode: screen;
        opacity: 0.18;
        pointer-events: none;
        animation: hero-pulse-scan 4.4s ease-in-out infinite;
      }

      .hero-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 54%, rgba(0, 0, 0, 0.46) 0%, transparent 14%, transparent 18%, rgba(139, 241, 240, 0.1) 18.2%, transparent 19.2%, transparent 27%, rgba(139, 241, 240, 0.08) 27.3%, transparent 28.1%, transparent 38%, rgba(139, 241, 240, 0.06) 38.3%, transparent 39.1%),
          linear-gradient(90deg, rgba(103, 237, 235, 0.05), transparent 28%, transparent 72%, rgba(103, 237, 235, 0.04)),
          radial-gradient(circle at 50% 52%, rgba(90, 240, 235, 0.08), transparent 32%);
        pointer-events: none;
        opacity: 0.92;
        transform-origin: center;
        mix-blend-mode: screen;
        animation: hero-pulse-rings 4.4s ease-in-out infinite;
      }

      .hero-tech {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .hero-rift {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0.78;
        mix-blend-mode: screen;
        filter: saturate(120%);
      }

      .hero-rift-core,
      .hero-rift-halo,
      .hero-rift-arcs {
        position: absolute;
        border-radius: 999px;
        pointer-events: none;
      }

      .hero-rift-core {
        width: min(54vw, 620px);
        aspect-ratio: 1 / 1;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle at 50% 50%, rgba(235, 254, 255, 0.94) 0 7%, rgba(160, 247, 255, 0.58) 10%, rgba(57, 221, 255, 0.28) 18%, rgba(66, 144, 255, 0.12) 29%, rgba(101, 23, 163, 0.18) 43%, rgba(14, 9, 45, 0.62) 57%, rgba(3, 4, 17, 0) 71%),
          conic-gradient(from 0deg, rgba(86, 240, 255, 0.12), rgba(255, 97, 201, 0.18), rgba(90, 98, 255, 0.16), rgba(86, 240, 255, 0.12));
        box-shadow:
          0 0 32px rgba(127, 243, 255, 0.32),
          0 0 100px rgba(77, 231, 255, 0.24),
          0 0 180px rgba(161, 70, 255, 0.16);
        animation: rift-drift 15s ease-in-out infinite;
      }

      .hero-rift-core::before,
      .hero-rift-core::after {
        content: "";
        position: absolute;
        inset: 13%;
        border-radius: inherit;
      }

      .hero-rift-core::before {
        background:
          radial-gradient(circle at 35% 42%, rgba(255, 255, 255, 0.46), transparent 16%),
          radial-gradient(circle at 65% 58%, rgba(129, 241, 255, 0.34), transparent 24%),
          radial-gradient(circle at 50% 50%, rgba(10, 11, 37, 0.86) 30%, rgba(10, 11, 37, 0.18) 49%, transparent 57%);
        filter: blur(2px);
        opacity: 0.95;
      }

      .hero-rift-core::after {
        inset: 7%;
        border: 1px solid rgba(182, 246, 255, 0.2);
        box-shadow:
          0 0 0 10px rgba(116, 224, 255, 0.04),
          0 0 28px rgba(116, 224, 255, 0.18),
          inset 0 0 24px rgba(255, 92, 201, 0.1);
        clip-path: polygon(12% 17%, 29% 8%, 44% 12%, 56% 7%, 76% 16%, 88% 31%, 91% 50%, 84% 68%, 72% 83%, 51% 92%, 33% 88%, 16% 77%, 7% 58%, 10% 37%);
        animation: rift-spin 26s linear infinite;
      }

      .hero-rift-halo {
        width: min(72vw, 900px);
        aspect-ratio: 1 / 1;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle, rgba(95, 243, 255, 0.18) 0 18%, rgba(95, 243, 255, 0.08) 24%, rgba(255, 86, 212, 0.06) 34%, transparent 58%),
          repeating-conic-gradient(from 0deg, rgba(134, 239, 255, 0.08) 0deg 10deg, transparent 10deg 26deg);
        filter: blur(14px);
        opacity: 0.6;
        animation: rift-breathe 9.2s ease-in-out infinite;
      }

      .hero-rift-arcs {
        width: min(86vw, 1040px);
        aspect-ratio: 1 / 1;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(circle at 50% 50%, transparent 0 33%, rgba(159, 246, 255, 0.16) 33.2% 33.6%, transparent 33.8% 41%, rgba(255, 90, 210, 0.1) 41.2% 41.45%, transparent 41.7% 48%, rgba(114, 225, 255, 0.08) 48.2% 48.35%, transparent 48.6%),
          conic-gradient(from 90deg, transparent 0 14%, rgba(146, 243, 255, 0.14) 16%, transparent 20% 41%, rgba(255, 88, 198, 0.14) 44%, transparent 48% 69%, rgba(109, 111, 255, 0.14) 72%, transparent 76% 100%);
        opacity: 0.38;
        animation: rift-spin 34s linear infinite reverse;
      }

      .hero-rings,
      .hero-rgb {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .hero-rings {
        background:
          radial-gradient(circle at 50% 54%, transparent 0 11%, rgba(148, 242, 241, 0.3) 11.1% 11.3%, transparent 11.4% 18.6%, rgba(148, 242, 241, 0.22) 18.7% 18.9%, transparent 19% 28.8%, rgba(148, 242, 241, 0.16) 28.9% 29.05%, transparent 29.15% 42%, rgba(148, 242, 241, 0.1) 42.1% 42.25%, transparent 42.35%),
          linear-gradient(180deg, rgba(118, 239, 237, 0.1), transparent 24%, transparent 76%, rgba(118, 239, 237, 0.08)),
          linear-gradient(90deg, rgba(0, 0, 0, 0.52), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.52));
        opacity: 0.34;
        mix-blend-mode: screen;
        transform: perspective(1200px) translateZ(0);
        animation: hero-pulse-rings 4.4s ease-in-out infinite;
      }

      .hero-rgb {
        opacity: 0;
        background:
          linear-gradient(90deg, transparent 0 14%, rgba(255, 44, 92, 0.18) 14% 14.4%, transparent 14.6% 84.8%, rgba(50, 234, 255, 0.18) 85% 85.4%, transparent 85.6% 100%),
          radial-gradient(circle at 50% 54%, transparent 0 18%, rgba(255, 44, 92, 0.14) 18.05% 18.2%, transparent 18.25% 27.8%, rgba(50, 234, 255, 0.14) 27.85% 28%, transparent 28.05%);
        mix-blend-mode: screen;
        animation: hero-pulse-rgb 4.4s ease-in-out infinite;
      }

      .gate {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(2, 6, 17, 0.16), rgba(2, 6, 17, 0.34)),
          radial-gradient(circle at center, rgba(130, 229, 255, 0.08), transparent 40%);
        opacity: 1;
      }

      .gate[hidden] {
        display: none;
      }

      .gate-panel {
        width: min(420px, 100%);
        padding: 0;
        text-align: center;
        animation: fade-in 900ms ease-out both;
      }

      .gate-form {
        margin-top: 0;
      }

      .gate-input {
        width: 100%;
        padding: 16px 18px;
        border: 1px solid rgba(194, 243, 255, 0.2);
        border-radius: 999px;
        background: rgba(8, 18, 34, 0.36);
        color: var(--text);
        font: inherit;
        font-size: 1rem;
        text-align: center;
        letter-spacing: 0.04em;
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .gate-input::placeholder {
        color: rgba(216, 244, 255, 0.44);
      }

      .gate-input:focus {
        border-color: rgba(202, 246, 255, 0.38);
        box-shadow:
          0 0 0 4px rgba(80, 215, 255, 0.08),
          0 0 22px rgba(80, 215, 255, 0.12);
        background: rgba(8, 18, 34, 0.5);
      }

      .gate-error {
        display: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 7vh 5vw;
        opacity: 1;
      }

      .panel {
        width: min(640px, 100%);
        padding: 24px 28px 20px;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(235, 251, 255, 0.16), rgba(235, 251, 255, 0.04) 16%, rgba(255, 255, 255, 0.015) 42%, rgba(7, 18, 35, 0.18) 100%),
          rgba(7, 18, 35, 0.18);
        backdrop-filter: blur(22px) saturate(140%);
        -webkit-backdrop-filter: blur(22px) saturate(140%);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        animation: fade-in 1200ms ease-out both;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05) 14%, transparent 34%),
          linear-gradient(135deg, rgba(202, 246, 255, 0.12), transparent 32%),
          radial-gradient(circle at top right, rgba(136, 233, 255, 0.16), transparent 30%);
        pointer-events: none;
      }

      .panel::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 17px;
        border: 1px solid rgba(228, 250, 255, 0.14);
        pointer-events: none;
      }


      .panel-glitch {
        position: absolute;
        inset: 10px;
        border-radius: 12px;
        pointer-events: none;
        opacity: 0.46;
      }

      .panel-glitch::before,
      .panel-glitch::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid rgba(185, 241, 255, 0.12);
        pointer-events: none;
      }

      .panel-glitch::before {
        clip-path: polygon(0 0, 38% 0, 38% 6%, 62% 6%, 62% 0, 100% 0, 100% 26%, 96% 26%, 96% 74%, 100% 74%, 100% 100%, 68% 100%, 68% 95%, 33% 95%, 33% 100%, 0 100%, 0 69%, 4% 69%, 4% 31%, 0 31%);
        box-shadow:
          0 0 12px rgba(80, 215, 255, 0.08),
          inset 0 0 12px rgba(80, 215, 255, 0.04);
      }

      .panel-glitch::after {
        inset: 3px 5px 4px 3px;
        border-color: rgba(255, 79, 216, 0.08);
        clip-path: polygon(0 0, 24% 0, 24% 3%, 52% 3%, 52% 0, 100% 0, 100% 18%, 97% 18%, 97% 83%, 100% 83%, 100% 100%, 73% 100%, 73% 97%, 41% 97%, 41% 100%, 0 100%, 0 77%, 2% 77%, 2% 23%, 0 23%);
        opacity: 0.72;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 4.2vw, 3.6rem);
        line-height: 0.92;
        font-family: "Oxanium", sans-serif;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text);
        text-shadow:
          1px 0 0 rgba(255, 79, 216, 0.42),
          2px 0 10px rgba(255, 79, 216, 0.24),
          0 0 18px rgba(136, 233, 255, 0.24),
          0 0 40px rgba(80, 215, 255, 0.12);
        -webkit-text-stroke: 0.45px rgba(3, 10, 22, 0.56);
        text-align: center;
      }

      .countdown {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .unit {
        position: relative;
        padding: 16px 10px 14px;
        border-radius: 22px;
        border: 1px solid rgba(180, 240, 255, 0.14);
        background: rgba(12, 24, 42, 0.18);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        text-align: center;
      }

      .unit::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 65%);
        pointer-events: none;
      }

      .label {
        display: block;
        margin-bottom: 10px;
        font-size: 0.82rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(209, 245, 255, 0.64);
      }

      .value {
        display: block;
        font-size: clamp(2.6rem, 5vw, 4rem);
        line-height: 1;
        font-weight: 700;
        color: var(--blue-bright);
        text-shadow:
          1px 0 0 rgba(255, 79, 216, 0.34),
          2px 0 8px rgba(255, 79, 216, 0.2),
          0 0 12px rgba(136, 233, 255, 0.36),
          0 0 28px rgba(80, 215, 255, 0.14);
        -webkit-text-stroke: 0.35px rgba(3, 10, 22, 0.48);
      }

      .value-seconds {
        display: inline-flex;
        align-items: baseline;
        justify-content: center;
        gap: 0.02em;
        min-width: 2.8em;
        font-variant-numeric: tabular-nums;
      }

      .value-fraction {
        font-size: 0.42em;
        letter-spacing: 0.04em;
        min-width: 1.25em;
        text-align: left;
      }

      .meta {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        margin-top: 16px;
        text-align: center;
      }

      .date-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border: 1px solid rgba(183, 241, 255, 0.16);
        border-radius: 999px;
        background: rgba(10, 22, 38, 0.22);
        color: rgba(226, 248, 255, 0.86);
        font-size: 0.74rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .date-pill::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--blue);
        box-shadow: 0 0 12px rgba(80, 215, 255, 0.8);
        animation: pulse 3.2s ease-in-out infinite;
      }

      .status {
        display: none;
        margin: 0;
        font-size: 0.95rem;
        color: rgba(222, 247, 255, 0.72);
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.12);
          opacity: 1;
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }


      @keyframes gate-fade {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      @keyframes ripple-flash {
        0% {
          opacity: 0.9;
          transform: scale(1);
          filter: brightness(1);
        }
        55% {
          opacity: 0.5;
          transform: scale(1.035);
          filter: brightness(1.16);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1);
        }
      }

      @keyframes hero-pulse-scan {
        0%,
        77%,
        100% {
          opacity: 0.18;
          transform: translateY(0);
        }
        82% {
          opacity: 0.26;
          transform: translateY(0.4%);
        }
        88% {
          opacity: 0.34;
          transform: translateY(-0.3%);
        }
        94% {
          opacity: 0.22;
          transform: translateY(0.1%);
        }
      }

      @keyframes hero-pulse-rings {
        0%,
        77%,
        100% {
          opacity: 0.3;
          transform: perspective(1200px) scale(1) translateX(0);
          filter: brightness(1);
        }
        82% {
          opacity: 0.4;
          transform: perspective(1200px) scale(1.008) translateX(-0.2%);
          filter: brightness(1.06);
        }
        88% {
          opacity: 0.52;
          transform: perspective(1200px) scale(1.018) translateX(0.25%);
          filter: brightness(1.12);
        }
        94% {
          opacity: 0.34;
          transform: perspective(1200px) scale(1.006) translateX(0);
          filter: brightness(1.02);
        }
      }

      @keyframes hero-pulse-rgb {
        0%,
        79%,
        100% {
          opacity: 0;
          transform: translateX(0);
        }
        84% {
          opacity: 0.12;
          transform: translateX(-0.25%);
        }
        89% {
          opacity: 0.18;
          transform: translateX(0.25%);
        }
        94% {
          opacity: 0.06;
          transform: translateX(0);
        }
      }

      @keyframes rift-drift {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(0.98) rotate(0deg);
          filter: hue-rotate(0deg);
        }
        50% {
          transform: translate(-50.6%, -49.4%) scale(1.03) rotate(6deg);
          filter: hue-rotate(18deg);
        }
      }

      @keyframes rift-breathe {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(0.96);
          opacity: 0.42;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.04);
          opacity: 0.72;
        }
      }

      @keyframes rift-spin {
        from {
          transform: translate(-50%, -50%) rotate(0deg);
        }
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @keyframes rift-bloom {
        0% {
          opacity: 0.34;
          transform: scale(0.92);
          filter: saturate(100%) brightness(0.92);
        }
        40% {
          opacity: 1;
          transform: scale(1.06);
          filter: saturate(145%) brightness(1.18);
        }
        100% {
          opacity: 0.82;
          transform: scale(1);
          filter: saturate(120%) brightness(1);
        }
      }

      @media (max-width: 960px) {
        .shell {
          align-items: center;
          padding: 5vw 5vw 7vw;
        }

        .panel {
          width: min(100%, 680px);
        }
      }

      @media (max-width: 640px) {
        .page {
        }

        .hero-bg {
          background-position: 73% center;
          background-image:
            linear-gradient(180deg, rgba(2, 6, 17, 0.28) 0%, rgba(2, 6, 17, 0.14) 38%, rgba(2, 6, 17, 0.44) 100%),
            linear-gradient(90deg, rgba(2, 6, 17, 0.4) 0%, rgba(2, 6, 17, 0.18) 44%, rgba(2, 6, 17, 0.04) 100%),
            url("hero-face.png");
        }

        .hero-rift-core {
          width: min(90vw, 520px);
          top: 44%;
        }

        .hero-rift-halo,
        .hero-rift-arcs {
          top: 44%;
        }

        .shell {
          justify-content: center;
          align-items: center;
          padding: 28px 18px;
        }

        .panel {
          padding: 24px 18px 20px;
          border-radius: 16px;
        }

        .gate-panel {
          padding: 16px;
          border-radius: 24px;
        }

        .countdown {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
          margin-top: 28px;
        }

        .meta {
          gap: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-bg::before,
        .hero-bg::after,
        .hero-rift-core,
        .hero-rift-halo,
        .hero-rift-arcs,
        .hero-rift-core::after,
        .hero-rings,
        .hero-rgb,
        .date-pill::before,
        .panel {
          animation: none;
        }

      }
    </style>
  </head>
  <body>
    <main class="page is-locked" id="page">
      <audio id="theme-audio" preload="auto" src="track.mp3"></audio>
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-tech" aria-hidden="true">
        <div class="hero-rift">
          <div class="hero-rift-halo"></div>
          <div class="hero-rift-core"></div>
          <div class="hero-rift-arcs"></div>
        </div>
        <div class="hero-rings"></div>
        <div class="hero-rgb"></div>
      </div>
      <section class="gate" id="gate" aria-label="Access gate">
        <div class="gate-panel">
          <form class="gate-form" id="gate-form">
            <input
              class="gate-input"
              id="gate-input"
              name="access"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="Type here"
              aria-describedby="gate-error"
            />
            <p class="gate-error" id="gate-error" aria-live="polite"></p>
          </form>
        </div>
      </section>
      <div class="shell">
        <section class="panel" aria-labelledby="countdown-title">
          <div class="panel-glitch" aria-hidden="true"></div>
          <h1 id="countdown-title">COACHELLA W2 COUNTDOWN!!!</h1>

          <div class="countdown" aria-live="polite">
            <div class="unit">
              <span class="label">Days</span>
              <span class="value" id="days">00</span>
            </div>
            <div class="unit">
              <span class="label">Hours</span>
              <span class="value" id="hours">00</span>
            </div>
            <div class="unit">
              <span class="label">Minutes</span>
              <span class="value" id="minutes">00</span>
            </div>
            <div class="unit">
              <span class="label">Seconds</span>
              <span class="value value-seconds"><span id="seconds">00</span><span class="value-fraction" id="hundredths">.00</span></span>
            </div>
          </div>

          <div class="meta">
            <div class="date-pill" id="date-pill">Friday, April 17, 2026 at 1:00 PM PDT</div>
            <p class="status" id="status">Live countdown in progress.</p>
          </div>
        </section>
      </div>
    </main>

    <script>
      // Edit this value to change the countdown target.
      const TARGET_DATE = "2026-04-17T13:00:00-07:00";

      const daysEl = document.getElementById("days");
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const hundredthsEl = document.getElementById("hundredths");
      const statusEl = document.getElementById("status");
      const datePillEl = document.getElementById("date-pill");
      const pageEl = document.getElementById("page");
      const gateEl = document.getElementById("gate");
      const gateFormEl = document.getElementById("gate-form");
      const gateInputEl = document.getElementById("gate-input");
      const gateErrorEl = document.getElementById("gate-error");
      const themeAudioEl = document.getElementById("theme-audio");
      const VALID_WORDS = new Set(["nativa", "teva", "alyssa", "mary", "droppinz", "maximo", "james", "amber", "marko", "alex"]);
      let hasUnlockedAudio = false;

      function formatDate(targetDate) {
        return new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit",
          timeZone: "America/Los_Angeles",
          timeZoneName: "short",
        }).format(new Date(targetDate));
      }

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function updateCountdown() {
        const difference = new Date(TARGET_DATE).getTime() - Date.now();

        if (difference <= 0) {
          daysEl.textContent = "00";
          hoursEl.textContent = "00";
          minutesEl.textContent = "00";
          secondsEl.textContent = "00";
          hundredthsEl.textContent = ".00";
          statusEl.textContent = "It's Time";
          return;
        }

        const totalSeconds = Math.floor(difference / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        const hundredths = Math.floor((difference % 1000) / 10);

        daysEl.textContent = pad(days);
        hoursEl.textContent = pad(hours);
        minutesEl.textContent = pad(minutes);
        secondsEl.textContent = pad(seconds);
        hundredthsEl.textContent = "." + pad(hundredths);
        statusEl.textContent = "Live countdown in progress.";
      }

      function unlockExperience() {
        pageEl.classList.add("is-unlocking");
        document.body.classList.add("unlocked");

        window.setTimeout(() => {
          pageEl.classList.remove("is-locked", "is-unlocking");
          gateEl.hidden = true;
        }, 720);
      }

      function handleAccess(event) {
        event.preventDefault();
        checkAccess(gateInputEl.value);
      }

      function checkAccess(rawValue) {
        const value = rawValue.trim().toLowerCase();

        if (VALID_WORDS.has(value)) {
          gateErrorEl.textContent = "";
          if (!hasUnlockedAudio) {
            hasUnlockedAudio = true;
            themeAudioEl.currentTime = 0;
            themeAudioEl.play().catch(() => {});
          }
          unlockExperience();
        }
      }

      datePillEl.textContent = formatDate(TARGET_DATE);
      updateCountdown();
      setInterval(updateCountdown, 50);
      gateFormEl.addEventListener("submit", handleAccess);
      gateInputEl.addEventListener("input", () => {
        gateErrorEl.textContent = "";
        checkAccess(gateInputEl.value);
      });
      gateInputEl.focus();
    </script>
  </body>
</html>
